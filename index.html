<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Kariyerim - Ayaz Entertainment</title>
    <style>
        :root {
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(10, 10, 10, 0.82); 
            --accent-red: #ff3e3e;
            --accent-gold: #ffd700;
            --text-color: #ffffff;
            --sidebar-hover: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            /* ARKA PLAN RESMİ BURADA - 8iXhR.jpg ile aynı klasörde olmalı */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('8iXhR.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 95%;
            max-width: 1100px;
            height: 650px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px); /* Cam efekti için arkadaki resmi hafif bulanıklaştırır */
            position: relative;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        .active { display: flex; flex-direction: column; }
        #start-screen.active, #role-screen.active { justify-content: center; align-items: center; }

        input {
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 30px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #333;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); transform: translateY(-2px); }

        .sidebar {
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-left: 4px solid var(--accent-red);
            padding-left: 20px;
            margin-top: 20px;
        }

        .sidebar-item {
            background: rgba(17, 17, 17, 0.6);
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #333;
            border-radius: 4px;
            transition: 0.2s;
        }

        .sidebar-item:hover { background: var(--sidebar-hover); border-color: var(--accent-red); color: var(--accent-red); }

        .header-ui {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 12px;
        }

        .level-container {
            background: #222;
            width: 300px;
            height: 30px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid #444;
        }

        .level-bar {
            background: linear-gradient(90deg, #ff3e3e, #ff8e53);
            height: 100%;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .level-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        #main-layout { display: flex; height: 85%; }
        #content-area { flex: 1; padding: 20px; overflow-y: auto; text-align: center; position: relative; }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .team-card {
            background: rgba(26, 26, 26, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-change-team {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: #444;
            font-size: 11px;
            padding: 8px 15px;
            opacity: 0.8;
            border: 1px solid #666;
        }
        .btn-change-team:hover { opacity: 1; background: #666; }

        .scoreboard {
            font-size: 6rem;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0,0,0,0.9);
            padding: 20px 50px;
            border-radius: 15px;
            border: 4px solid var(--accent-red);
            margin: 20px;
            color: var(--accent-red);
            text-shadow: 0 0 20px var(--accent-red);
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1 style="color: var(--accent-red); letter-spacing: 5px; text-shadow: 2px 2px 15px #000;">FUTBOLCUNU ADLANDIR</h1>
        <input type="text" id="player-name-input" placeholder="Efsanenin adını yaz...">
        <button onclick="startGame()">KARİYERE BAŞLA</button>
    </div>

    <div id="role-screen" class="screen">
        <h2 style="color: var(--accent-gold); text-shadow: 2px 2px 10px #000;">MEVKİNİ SEÇ</h2>
        <div style="display: flex; gap: 20px;">
            <button onclick="setRole('Forvet')">FORVET</button>
            <button onclick="setRole('Orta Saha')">ORTA SAHA</button>
            <button onclick="setRole('Kaleci')">KALECİ</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="header-ui">
            <div id="ui-name-label" style="font-size: 20px; font-weight: bold; color: var(--accent-gold);"></div>
            <div>
                <div class="level-container"><div id="level-bar" class="level-bar"></div><div class="level-text" id="ui-level-val">0 / 1000</div></div>
            </div>
            <button onclick="resetGame()" style="background: #a00; font-size: 10px;">SIFIRLA</button>
        </div>

        <div id="main-layout">
            <div class="sidebar">
                <div class="sidebar-item" onclick="showSection('home')">ANA SAYFA</div>
                <div class="sidebar-item" onclick="showSection('player')">OYUNCU</div>
                <div class="sidebar-item" onclick="showSection('training')">ANTRENMAN</div>
                <div id="team-btn" class="sidebar-item" onclick="showSection('teams')">TAKIM (Lv 30)</div>
            </div>

            <div id="content-area">
                <div id="view-home">
                    <h2 style="color: var(--accent-red); text-shadow: 1px 1px 5px #000;">HOŞ GELDİN, ŞAMPİYON!</h2>
                    <p>Galibiyet başına +5 SEVİYE kazanırsın!</p>
                </div>

                <div id="view-player" style="display:none;">
                    <h2 style="color: var(--accent-gold);">OYUNCU KARTI</h2>
                    <div style="background: rgba(0,0,0,0.6); padding: 30px; border-radius: 15px; border: 2px solid var(--accent-gold); display: inline-block; text-align: left;">
                        <p>👤 <strong>İsim:</strong> <span id="p-info-name"></span></p>
                        <p>⚽ <strong>Mevki:</strong> <span id="p-info-role"></span></p>
                        <p>⭐ <strong>Seviye:</strong> <span id="p-info-lv"></span> / 1000</p>
                        <p>🏆 <strong>Kulüp:</strong> <span id="p-info-team">Boşta</span></p>
                    </div>
                </div>

                <div id="view-training" style="display:none;">
                    <h2>ANTRENMAN MERKEZİ</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button onclick="doTrain('HIZ')">HIZ ÇALIŞMASI</button>
                        <button onclick="doTrain('ŞUT')">ŞUT ANTRENMANI</button>
                        <button onclick="doTrain('PAS')">PAS ÇALIŞMASI</button>
                        <button onclick="doTrain('GÜÇ')">KONDİSYON</button>
                    </div>
                    <p id="train-log" style="margin-top: 20px; font-weight: bold; color: var(--accent-gold);"></p>
                </div>

                <div id="view-teams" style="display:none;">
                    <h2 style="color: var(--accent-gold);">TAKIM YÖNETİMİ</h2>
                    <div id="team-grid" class="team-grid"></div>
                    <div id="active-match-btn" style="display:none; margin-top: 20px;">
                        <button onclick="findMatch()" style="background: var(--accent-red); font-size: 20px; padding: 20px 50px;">MAÇ YAP</button>
                    </div>
                    <button id="change-team-btn" class="btn-change-team" style="display:none;" onclick="confirmChangeTeam()">TAKIMI DEĞİŞTİR (-10 LV)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="match-screen" class="screen" style="justify-content: center; align-items: center;">
        <h2 id="match-status" style="color: white; font-size: 24px; text-shadow: 2px 2px 5px #000;">RAKİP ARANIYOR...</h2>
        <div class="scoreboard"><span id="s-my">0</span> - <span id="s-opp">0</span></div>
        <div style="font-size: 30px; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 10px;">DAKİKA: <span id="m-time">90</span>'</div>
        <div id="m-events" style="margin-top: 20px; font-size: 20px; color: var(--accent-gold); height: 30px;"></div>
        <button id="btn-finish" style="display:none; margin-top: 30px; background: #4caf50;" onclick="goToMain()">ANA MENÜYE DÖN</button>
    </div>

    <script>
        let playerData = { name: "", role: "", level: 0, team: "" };
        const allTeams = [
            "Pendik Anadolu Spor", "İstanbul United", "Ayaz City", "Blender SK", "Unity Force", "Roblox Giants",
            "Pixel Horror", "Hamburgeria FC", "Eagle Wings", "Lion Hearts", "Thunder Boys", "Galaxy Stars",
            "Neon United", "Cyber Rangers", "Dragon Academy", "Shadow Kings"
        ];

        function save() { localStorage.setItem('ayazFutbolSave_final', JSON.stringify(playerData)); }
        function load() {
            const saved = localStorage.getItem('ayazFutbolSave_final');
            if(saved) {
                playerData = JSON.parse(saved);
                if(playerData.name) {
                    updateUI();
                    document.getElementById('ui-name-label').innerText = `${playerData.name.toUpperCase()} (${playerData.role})`;
                    showScreen('main-screen');
                }
            }
        }

        window.onload = load;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            const val = document.getElementById('player-name-input').value;
            if(!val) return alert("İsim girmelisin!");
            playerData.name = val;
            showScreen('role-screen');
        }

        function setRole(r) {
            playerData.role = r;
            document.getElementById('ui-name-label').innerText = `${playerData.name.toUpperCase()} (${playerData.role})`;
            save();
            showScreen('main-screen');
            updateUI();
        }

        function doTrain(t) {
            document.getElementById('train-log').innerText = t + " çalışılıyor... (5 saniye)";
            setTimeout(() => {
                if(playerData.level < 1000) {
                    playerData.level += 10;
                    if(playerData.level > 1000) playerData.level = 1000;
                    updateUI();
                    save();
                }
                document.getElementById('train-log').innerText = "Çalışma bitti! +10 Seviye";
            }, 5000);
        }

        function updateUI() {
            const percentage = (playerData.level / 1000) * 100;
            document.getElementById('level-bar').style.width = percentage + "%";
            document.getElementById('ui-level-val').innerText = `${playerData.level} / 1000`;
            if(playerData.level >= 30) document.getElementById('team-btn').style.color = "#0f0";
            else document.getElementById('team-btn').style.color = "white";
        }

        function showSection(sect) {
            document.querySelectorAll('#content-area > div').forEach(v => v.style.display = 'none');
            if(sect === 'teams' && playerData.level < 30) return alert("Lv 30 olmadan transfer teklifi alamazsın!");
            document.getElementById('view-' + sect).style.display = 'block';
            if(sect === 'player') {
                document.getElementById('p-info-name').innerText = playerData.name;
                document.getElementById('p-info-role').innerText = playerData.role;
                document.getElementById('p-info-lv').innerText = playerData.level;
                document.getElementById('p-info-team').innerText = playerData.team || "Boşta";
            }
            if(sect === 'teams') renderTeams();
        }

        function renderTeams() {
            const grid = document.getElementById('team-grid');
            const changeBtn = document.getElementById('change-team-btn');
            if(playerData.team) {
                grid.innerHTML = `<p style="grid-column: span 2; font-size: 20px; margin-top: 50px;">Mevcut Takımın: <br><span style="color:var(--accent-red); font-size: 32px; font-weight:bold;">${playerData.team}</span></p>`;
                document.getElementById('active-match-btn').style.display = 'block';
                changeBtn.style.display = 'block';
            } else {
                grid.innerHTML = allTeams.map(t => `<div class="team-card"><span>${t}</span><button onclick="joinTeam('${t}')" style="padding: 5px 15px; font-size: 12px;">KATIL</button></div>`).join('');
                document.getElementById('active-match-btn').style.display = 'none';
                changeBtn.style.display = 'none';
            }
        }

        function joinTeam(t) {
            playerData.team = t;
            save();
            renderTeams();
        }

        function confirmChangeTeam() {
            if(confirm("Takım değiştirmek istediğine emin misin? (-10 SEVİYE PUANI)")) {
                playerData.level = Math.max(0, playerData.level - 10);
                playerData.team = "";
                save();
                updateUI();
                renderTeams();
                alert("Sözleşmen iptal edildi. Yeni takım seçebilirsin.");
            }
        }

        function findMatch() {
            showScreen('match-screen');
            document.getElementById('s-my').innerText = "0";
            document.getElementById('s-opp').innerText = "0";
            document.getElementById('btn-finish').style.display = 'none';
            document.getElementById('m-events').innerText = "";
            setTimeout(startMatch, 2000);
        }

        function startMatch() {
            let time = 90;
            document.getElementById('match-status').innerText = playerData.team + " sahaya çıktı!";
            const interval = setInterval(() => {
                time--;
                document.getElementById('m-time').innerText = time;
                if(Math.random() < 0.04) {
                    const goalForMe = Math.random() > 0.5;
                    const scoreId = goalForMe ? 's-my' : 's-opp';
                    document.getElementById(scoreId).innerText = parseInt(document.getElementById(scoreId).innerText) + 1;
                    document.getElementById('m-events').innerText = goalForMe ? "GOOOOL! Skor değişti!" : "Rakip gol attı!";
                    setTimeout(() => document.getElementById('m-events').innerText = "", 2000);
                }
                if(time <= 0) {
                    clearInterval(interval);
                    const myScore = parseInt(document.getElementById('s-my').innerText);
                    const oppScore = parseInt(document.getElementById('s-opp').innerText);
                    if(myScore > oppScore) {
                        document.getElementById('match-status').innerText = "GALİBİYET! +5 Seviye!";
                        playerData.level += 5;
                        if(playerData.level > 1000) playerData.level = 1000;
                        updateUI();
                        save();
                    } else {
                        document.getElementById('match-status').innerText = "MAÇ BİTTİ!";
                    }
                    document.getElementById('btn-finish').style.display = 'block';
                }
            }, 400);
        }

        function goToMain() { showScreen('main-screen'); showSection('home'); }
        function resetGame() { if(confirm("Her şey silinsin mi?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
